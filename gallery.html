<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Browse the Bean Haven gallery – our café, food, drinks, and atmosphere."/>
  <title>Gallery – Bean Haven Café</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

  <header class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">☕ Bean Haven</a>
      <button class="hamburger" id="hamburger">&#9776;</button>
      <nav class="nav-links" id="nav-links">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <section class="page-hero">
    <h1>Gallery</h1>
    <p>A peek inside Bean Haven.</p>
  </section>

  <section class="gallery-page section">
    <div class="container">
      <div class="gallery-grid">
        <div class="gallery-item" style="background:#d4a574;" title="Our signature latte art">☕</div>
        <div class="gallery-item" style="background:#8fbc8f;" title="Fresh avocado toast">🥑</div>
        <div class="gallery-item" style="background:#c8a882;" title="Morning pastries">🧁</div>
        <div class="gallery-item" style="background:#b5937a;" title="Cozy interior seating">🪑</div>
        <div class="gallery-item" style="background:#a0c0a0;" title="Our garden terrace">🌿</div>
        <div class="gallery-item" style="background:#e8d5b7;" title="Brunch spread">🍳</div>
        <div class="gallery-item" style="background:#d4a574;" title="Cold brew bar">🧊</div>
        <div class="gallery-item" style="background:#c4b49e;" title="Team at work">👨‍🍳</div>
        <div class="gallery-item" style="background:#9eb89e;" title="Weekend specials">🌸</div>
      </div>
      <p class="gallery-note">Replace the colored boxes above with real <code>&lt;img&gt;</code> tags pointing to your photos in the <code>images/</code> folder.</p>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-inner">
      <p>© 2025 Bean Haven Café. All rights reserved.</p>
      <div class="social-links">
        <a href="#">Instagram</a>
        <a href="#">Facebook</a>
        <a href="#">Twitter</a>
      </div>
    </div>
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lightbox-close">&times;</span>
    <div class="lightbox-content" id="lightbox-content"></div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
